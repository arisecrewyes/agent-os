services:
  agent-os:
    image: node:22-alpine
    container_name: agent-os
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    volumes:
      - .:/app
      - agentos-data:/data
    working_dir: /app
    command: >
      sh -c "npm install && npm run build && npx next start -p 3000"

volumes:
  agentos-data:
