services:
  agent-os:
    build:
      context: ./agentos
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - VAULT_PATH=/data/agentos-vault
      - NEXT_PUBLIC_APP_URL=https://agentos.srv1121935.hstgr.cloud
    labels:
      - traefik.enable=true
      - traefik.docker.network=root_default
      - traefik.http.routers.agent-os.rule=Host(`agentos.srv1121935.hstgr.cloud`)
      - traefik.http.routers.agent-os.entrypoints=websecure
      - traefik.http.routers.agent-os.tls=true
      - traefik.http.routers.agent-os.tls.certresolver=mytlschallenge
      - traefik.http.services.agent-os.loadbalancer.server.port=3000
    volumes:
      - agentos-vault:/data/agentos-vault
    networks:
      - root_default

volumes:
  agentos-vault:

networks:
  root_default:
    external: true
