services:
  goldie-hermes-mcp:
    image: ghcr.io/arisecrewyes/goldie-stack:latest
    container_name: goldie-hermes-mcp
    restart: unless-stopped
    expose:
      - "8650"
    environment:
      - NODE_ENV=production
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    networks:
      - root_default

networks:
  root_default:
    external: true
