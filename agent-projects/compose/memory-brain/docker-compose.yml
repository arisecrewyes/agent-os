services:
  memory-engine:
    image: ghcr.io/arisecrewyes/memory-brain:latest
    container_name: memory-engine
    restart: unless-stopped
    expose:
      - "8090"
    environment:
      - PYTHONUNBUFFERED=1
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OBSIDIAN_VAULT_PATH=/data/obsidian-vault
    volumes:
      - obsidian-vault:/data/obsidian-vault
    networks:
      - root_default

volumes:
  obsidian-vault:

networks:
  root_default:
    external: true
