services:
  content-creator:
    image: ghcr.io/arisecrewyes/content-creator:latest
    container_name: content-creator
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      - PYTHONUNBUFFERED=1
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    networks:
      - root_default

networks:
  root_default:
    external: true
