services:
  hermes:
    image: ghcr.io/arisecrewyes/hermes-agent:latest
    container_name: hermes
    restart: unless-stopped
    expose:
      - "8642"
    environment:
      - PYTHONUNBUFFERED=1
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - API_SERVER_ENABLED=true
      - API_SERVER_PORT=8642
    networks:
      - root_default

networks:
  root_default:
    external: true
